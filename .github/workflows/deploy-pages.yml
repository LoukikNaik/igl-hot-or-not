# Deploys the static frontend (public/) to GitHub Pages on every push to main.
# The backend (server.js + SQLite) is NOT deployed here — run it locally and expose
# it via ngrok, then set window.API_BASE in public/config.js to that ngrok URL.
#
# Requires: repo Settings → Pages → Source = "GitHub Actions".
# Note: publishing Pages from a PRIVATE repo needs a paid GitHub plan (Pro/Team).
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload public/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
