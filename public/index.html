<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Funny or Not, India's Got Latent</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('igl_theme') || 'black');</script>
<meta name="description" content="Vote head-to-head on who's funnier — the panelists of India's Got Latent Seasons 1 & 2. Then see the live leaderboard.">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#08080b">
<meta property="og:type" content="website">
<meta property="og:site_name" content="India's Got Latent · Funny or Not">
<meta property="og:title" content="Funny or Not · India's Got Latent">
<meta property="og:description" content="Vote head-to-head on who's funnier — the panelists of India's Got Latent Seasons 1 & 2. Then see the live leaderboard.">
<meta property="og:url" content="https://igl.loukik.dev/">
<meta property="og:image" content="https://igl.loukik.dev/og.png">
<meta property="og:image:width" content="1200">

<meta name="twitter:card" content="summary_large_image">

<link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <a class="brandLink" href="index.html"><img class="navlogo" src="icon-512.png" alt="IGL" width="30" height="30"><span class="brand">INDIA'S GOT <em>LATENT</em> · FUNNY OR NOT</span></a>
  <div class="links">
    <a href="index.html">🔥 Face-Off</a>
    <a href="leaderboard.html">🏆 Leaderboard</a>
    <button class="themeToggle" title="Switch theme" aria-label="Switch theme">☀️</button>
  </div>
</nav>
<main>
  <h1>Who's <em>funnier</em>?</h1>
  <p class="sub">Click a card (or press ← / →). Every vote moves the Elo ranking on the public leaderboard. One vote per matchup per person.</p>

  <div class="chips" id="pools">
    <button class="chip on" data-pool="panel">All panelists</button>
    <button class="chip" data-pool="panel-s1">Season 1</button>
    <button class="chip" data-pool="panel-s2">Season 2</button>
  </div>

  <div class="arena" id="arena">
    <div id="slotA"></div>
    <div class="vs">VS</div>
    <div id="slotB"></div>
  </div>
  <div class="toolbar">
    <button class="btn" id="skip">Skip this matchup →</button>
  </div>
  <div class="sessionNote" id="sessionNote"></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
let pool = 'panel';
let current = null;
let voting = false;

async function loadMatchup() {
  voting = false;
  const m = await API.get('/api/matchup?pool=' + pool);
  if (m.error) return;
  current = m;
  render();
}

function render() {
  const a = document.getElementById('slotA');
  const b = document.getElementById('slotB');
  a.innerHTML = ''; b.innerHTML = '';
  a.appendChild(personCard(current.a, { clickable: true }));
  b.appendChild(personCard(current.b, { clickable: true }));
  a.firstChild.onclick = () => vote(current.a, current.b, a.firstChild, b.firstChild);
  b.firstChild.onclick = () => vote(current.b, current.a, b.firstChild, a.firstChild);
}

function bumpSession() {
  const n = (parseInt(localStorage.getItem('igl_session_votes') || '0', 10) + 1);
  localStorage.setItem('igl_session_votes', n);
  renderSession();
}
function renderSession() {
  const n = parseInt(localStorage.getItem('igl_session_votes') || '0', 10);
  document.getElementById('sessionNote').textContent =
    n ? `You've decided ${n} matchup${n === 1 ? '' : 's'}, every one moves the leaderboard.` : 'Use ← / → to vote from the keyboard.';
}

async function vote(winner, loser, winCard, loseCard) {
  if (voting) return;
  voting = true;
  winCard.classList.add('won');
  loseCard.classList.add('lost');
  const res = await API.post('/api/faceoff', { winnerId: winner.id, loserId: loser.id });
  if (res && res.winnerDelta !== undefined) {
    const up = document.createElement('div');
    up.className = 'eloDelta';
    up.textContent = `+${res.winnerDelta} Elo`;
    winCard.appendChild(up);
    const down = document.createElement('div');
    down.className = 'eloDelta neg';
    down.textContent = `${res.loserDelta} Elo`;
    loseCard.appendChild(down);
  }
  bumpSession();
  if (res && res.myVotes !== undefined) paintLeaderboardLink(res.myVotes);
  setTimeout(loadMatchup, 800);
}

document.getElementById('pools').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#pools .chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  pool = chip.dataset.pool;
  loadMatchup();
});
document.getElementById('skip').onclick = loadMatchup;
document.addEventListener('keydown', e => {
  if (!current || voting) return;
  if (e.key === 'ArrowLeft') document.getElementById('slotA').firstChild.click();
  if (e.key === 'ArrowRight') document.getElementById('slotB').firstChild.click();
});

renderSession();
loadMatchup();
</script>
</body>
</html>
