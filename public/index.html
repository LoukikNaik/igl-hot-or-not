<main>
  <h1>Who's <em>funnier</em>?</h1>
  <p class="sub">Comedy is subjective. We're settling it anyway. Two India's Got Latent panelists, one question: who's funnier? Swipe, tap, or use ← / →.</p>

  <div class="chips" id="pools">
    <button class="chip on" data-pool="panel">All panelists</button>
    <button class="chip" data-pool="panel-s1">Season 1</button>
    <button class="chip" data-pool="panel-s2">Season 2</button>
  </div>

  <div class="arena" id="arena">
    <div id="slotA"></div>
    <div class="vs">VS</div>
    <div id="slotB"></div>
  </div>
  <div class="toolbar">
    <button class="btn" id="skip">Ugh, too close — skip →</button>
  </div>
  <div class="sessionNote" id="sessionNote"></div>
</main>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
let pool = 'panel';
let current = null;
let voting = false;
const arena = document.getElementById('arena');
const wait = ms => new Promise(r => setTimeout(r, ms));

async function fetchMatchup() {
  const m = await API.get('/api/matchup?pool=' + pool);
  return m && !m.error ? m : null;
}

function render() {
  const a = document.getElementById('slotA'), b = document.getElementById('slotB');
  a.innerHTML = ''; b.innerHTML = '';
  a.appendChild(personCard(current.a, { clickable: true }));
  b.appendChild(personCard(current.b, { clickable: true }));
  a.firstChild.onclick = () => commitVote(-1);   // left card wins
  b.firstChild.onclick = () => commitVote(1);    // right card wins
}

async function loadMatchup() {
  const m = await fetchMatchup();
  if (!m) return;
  current = m; render();
  arena.style.transition = 'none';
  arena.style.transform = 'translateX(0) rotate(0)';
  arena.style.opacity = '1';
  voting = false;
}

function bumpSession() {
  const n = (parseInt(localStorage.getItem('igl_session_votes') || '0', 10) + 1);
  localStorage.setItem('igl_session_votes', n);
  renderSession();
}
function renderSession() {
  const n = parseInt(localStorage.getItem('igl_session_votes') || '0', 10);
  const isTouch = matchMedia('(hover: none)').matches;
  const hint = isTouch ? 'Swipe the funnier one to glory.' : '\u2190 / \u2192 or click. You are the panel now.';
  document.getElementById('sessionNote').textContent =
    n ? `${n} vote${n === 1 ? '' : 's'} in. Every one nudges the rankings.` : hint;
}

// Tinder-style: the whole arena flings off in the swipe direction, next matchup slides in.
async function commitVote(dir) {              // dir: -1 = left wins, +1 = right wins
  if (voting || !current) return;
  voting = true;
  const winner = dir < 0 ? current.a : current.b;
  const loser  = dir < 0 ? current.b : current.a;

  submitVote(winner.id, loser.id).then(res => {
    bumpSession();
    if (res && res.myVotes !== undefined) {
      paintLeaderboardLink(res.myVotes);
      if (res.myVotes === LEADERBOARD_UNLOCK && !localStorage.getItem('igl_unlock_shown')) {
        localStorage.setItem('igl_unlock_shown', '1');
        setTimeout(showUnlockModal, 500);   // let the fling settle first
      }
    }
  }).catch(() => {});

  arena.style.transition = 'transform .34s cubic-bezier(.55,.06,.68,.19), opacity .34s ease-in';
  arena.style.transform = `translateX(${dir * 130}vw) rotate(${dir * 15}deg)`;
  arena.style.opacity = '0';

  const [, next] = await Promise.all([wait(340), fetchMatchup()]);
  if (next) current = next;

  arena.style.transition = 'none';
  arena.style.transform = `translateX(${-dir * 42}vw) rotate(${-dir * 6}deg)`;
  arena.style.opacity = '0';
  render();
  await wait(20);
  arena.style.transition = 'transform .32s cubic-bezier(.2,.7,.3,1), opacity .3s ease-out';
  arena.style.transform = 'translateX(0) rotate(0)';
  arena.style.opacity = '1';
  await wait(320);
  voting = false;
}

// ---- drag: the arena follows the finger, release past threshold to fling ----
(function setupSwipe() {
  const THRESH = 60;
  let startX = 0, startY = 0, dx = 0, active = false, horiz = false;
  const cardA = () => document.getElementById('slotA').firstChild;
  const cardB = () => document.getElementById('slotB').firstChild;
  const clearPick = () => [cardA(), cardB()].forEach(c => c && c.classList.remove('picking'));

  arena.addEventListener('touchstart', e => {
    if (voting || !current) return;
    const t = e.touches[0]; startX = t.clientX; startY = t.clientY; dx = 0; active = true; horiz = false;
  }, { passive: true });

  arena.addEventListener('touchmove', e => {
    if (!active) return;
    const t = e.touches[0]; dx = t.clientX - startX; const dy = t.clientY - startY;
    if (!horiz && Math.abs(dx) < Math.abs(dy)) { active = false; return; }
    horiz = true; e.preventDefault();
    arena.style.transition = 'none';
    arena.style.transform = `translateX(${dx}px) rotate(${dx * 0.04}deg)`;
    const a = cardA(), b = cardB();
    if (a) a.classList.toggle('picking', dx < -14);
    if (b) b.classList.toggle('picking', dx > 14);
  }, { passive: false });

  const release = () => {
    if (!active) return; active = false; clearPick();
    if (dx <= -THRESH) return commitVote(-1);
    if (dx >= THRESH) return commitVote(1);
    arena.style.transition = 'transform .25s ease';
    arena.style.transform = 'translateX(0) rotate(0)';
  };
  arena.addEventListener('touchend', release);
  arena.addEventListener('touchcancel', release);
})();

document.getElementById('pools').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#pools .chip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  pool = chip.dataset.pool;
  loadMatchup();
});
document.getElementById('skip').onclick = loadMatchup;
document.addEventListener('keydown', e => {
  if (voting || !current) return;
  if (e.key === 'ArrowLeft') commitVote(-1);
  if (e.key === 'ArrowRight') commitVote(1);
});

renderSession();
loadMatchup();
ensureSession().catch(() => {});   // pre-warm the proof-of-human session so the first vote is instant
</script>
</body>
